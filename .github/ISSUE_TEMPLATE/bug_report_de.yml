name: Melde einen Frontend-Fehler
description: Melde einen Fehler mit dem HomematicIP Local Frontend (Cards oder Config Panel)
body:
  - type: markdown
    attributes:
      value: |
        Dieses Formular dient ausschließlich zur Meldung von Fehlern!
        Nutze die [Diskussionen](https://github.com/SukramJ/homematicip-local-frontend/discussions) für Funktionswünsche, Fragen und andere Themen.

        Bitte vermeide unnötigen Aufwand, indem die folgenden Punkte aufmerksam gelesen werden.
  - type: checkboxes
    attributes:
      label: Ich stimme dem Folgenden zu
      options:
        - label: Ich habe den Browser-Cache geleert (Strg+F5 / Cmd+Shift+R) und das Problem besteht weiterhin
          required: true
        - label: Ich verwende die neueste Version der betroffenen Card bzw. des Config Panels. Siehe [Releases](https://github.com/SukramJ/homematicip-local-frontend/releases).
          required: true
        - label: Ich verwende die neueste Version von [Home Assistant](https://www.home-assistant.io/blog/) und der [HomematicIP Local Integration](https://github.com/sukramj/homematicip_local/releases).
          required: true
        - label: Ich habe die [bestehenden Issues](https://github.com/SukramJ/homematicip-local-frontend/issues) geprüft und sichergestellt, dass dieses Problem noch nicht gemeldet wurde
          required: true
  - type: dropdown
    id: package
    validations:
      required: true
    attributes:
      label: Betroffenes Paket
      description: >
        Welcher Teil des Frontends ist betroffen?
      options:
        - Climate Schedule Card (homematicip-local-climate-schedule-card)
        - Schedule Card (homematicip-local-schedule-card)
        - Config Panel (HomematicIP Local Integrationseinstellungen)
        - Mehrere / Unsicher
  - type: textarea
    validations:
      required: true
    attributes:
      label: Das Problem
      description: >-
        Bitte beantworte die folgenden Fragen:

        1. **Was passiert?** (Beschreibe das tatsächliche Verhalten)

        2. **Wann/Wie tritt es auf?** (Nach Seiten-Reload, beim Bearbeiten, beim Profil-Wechsel, beim Speichern, bei bestimmten Geräten, ...)

        3. **Was hast Du erwartet?** (Beschreibe das erwartete Verhalten)

        4. **Was hast Du bereits versucht?** (Browser-Cache geleert, anderer Browser, Card neu installiert, ...)

        Keine Logs oder Konfigurationen hier!
  - type: markdown
    attributes:
      value: |
        ## Systemumgebung
  - type: input
    id: card_version
    validations:
      required: true
    attributes:
      label: Card- / Config-Panel-Version
      placeholder: "0.10.0"
      description: >
        Für Cards: HACS -> Frontend -> Card auswählen.
        Für das Config Panel: Integrationsversion prüfen.
  - type: input
    attributes:
      label: Letzte funktionierende Version
      placeholder: "0.9.0"
      description: >
        Falls bekannt, andernfalls leer lassen.
  - type: input
    id: ha_version
    validations:
      required: true
    attributes:
      label: Home Assistant Version
      placeholder: "2025.12.0"
      description: >
        Zu finden unter: [Einstellungen -> System -> Reparaturen -> Drei Punkte -> Systeminformation](https://my.home-assistant.io/redirect/system_health/)
  - type: input
    id: integration_version
    validations:
      required: true
    attributes:
      label: HomematicIP Local Integrations-Version
      placeholder: 2.x.x
      description: >
        Zu finden unter: HACS -> Integrationen -> HomematicIP Local
  - type: dropdown
    id: installation
    validations:
      required: true
    attributes:
      label: Wie wurde die Card / das Config Panel installiert?
      options:
        - HACS
        - Manuelle Installation
        - Config Panel (in die Integration integriert)
  - type: dropdown
    id: browser
    validations:
      required: true
    attributes:
      label: Browser / Client
      description: >
        Welchen Browser oder Client verwendest Du?
      options:
        - Google Chrome
        - Mozilla Firefox
        - Safari
        - Microsoft Edge
        - Home Assistant Companion App (Android)
        - Home Assistant Companion App (iOS)
        - Anderer (bitte in den weiteren Informationen angeben)
  - type: markdown
    attributes:
      value: |
        ## Details
  - type: textarea
    id: card_config
    attributes:
      label: Card-Konfiguration (YAML)
      description: >-
        Für Card-Probleme: Füge hier Deine Card-Konfiguration ein.

        **So findest Du sie**: Card-Editor öffnen -> Code-Editor anzeigen -> YAML kopieren.

        Bei Config-Panel-Problemen kannst Du dieses Feld überspringen.
      render: yaml
      placeholder: |
        type: custom:homematicip-local-climate-schedule-card
        entity: climate.dein_thermostat
  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots
      description: >-
        Screenshots sind extrem hilfreich, besonders bei visuellen Problemen!

        Bitte füge hinzu:

        - Einen Screenshot der Card / des Config Panels, der das Problem zeigt

        - Wenn möglich, auch einen Screenshot des erwarteten Verhaltens (z.B. von der CCU oder einer früheren Version)
  - type: textarea
    id: console_errors
    attributes:
      label: Browser-Konsolenfehler
      description: >-
        Öffne die Browser-Entwicklertools (F12) -> Tab "Konsole" -> Problem reproduzieren.

        Kopiere alle Fehlermeldungen, die erscheinen (insbesondere solche, die den Card- oder Komponentennamen erwähnen).
      render: text
      placeholder: "Browser-Konsolenfehler hier einfügen"
  - type: textarea
    id: additional
    attributes:
      label: Weitere Informationen
      description: >
        Zusätzlicher Kontext, z.B. welches Gerätemodell Du verwendest (HmIP-eTRV, HmIP-BWTH, HmIP-BSM, ...),
        Anzahl der Profile, Schedule-Domäne (switch, light, cover, valve) oder Schritte zur Reproduktion des Problems.
