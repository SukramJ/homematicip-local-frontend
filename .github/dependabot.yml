# yamllint disable-line rule:truthy
version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    cooldown:
      default-days: 7
    reviewers:
      - "SukramJ"
    labels:
      - "dependencies"
      - "github-actions"
    commit-message:
      prefix: "chore"
    groups:
      github-actions:
        patterns:
          - "*"

  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    cooldown:
      default-days: 7
    reviewers:
      - "SukramJ"
    labels:
      - "dependencies"
      - "npm"
    commit-message:
      prefix: "chore"
    ignore:
      # typescript-eslint, ts-jest and @rollup/plugin-typescript do not support TypeScript 7 yet
      - dependency-name: "typescript"
        update-types: ["version-update:semver-major"]
    groups:
      npm:
        patterns:
          - "*"
